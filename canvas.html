<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Speedway Moto Race - Fullscreen</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Döljer scroll-lister */
            background: #11581b;
        }
        canvas {
            display: block; /* Tar bort dolda marginaler i botten */
            width: 100vw;   /* 100% av skärmens bredd */
            height: 100vh;  /* 100% av skärmens höjd */
            background: #11581b;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" tabindex="1"></canvas>

    <script src="test.js"></script>
</body>
</html>
